<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Circle</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/contact.css">

    <link rel="icon" type="image/png" href="/assets/icons/favicon.ico">

  </head>

  <body>
    <header>
      <nav>
          <h2>Circle</h2>

          <button class="menu-toggle">☰</button>

          <ul class="nav-menu">
              <li><a href="/index.html">Home</a></li>
              <li><a href="/projects.html">Projects</a></li>
              <li><a href="/index.html#services">Services</a></li>
              
              <li class="mobile-only">
                  <a href="/contact.html" class="mobile-btn">Contact Us</a>
              </li>
          </ul>

          <a href="/contact.html" class="btn-contact desktop-only">Contact Us</a>
      </nav>
    </header>

    <section class="contact">
      <h1 class="contact">Contact Us</h1>

      <form class="contact-form" id="contactForm">
        <div class="form-clients-name">
          <label> Full Name</label>
          <input type="text" id="name"placeholder="Enter your full name" />
        </div>

        <article class="form-row">
          <div>
            <label> Email </label>
            <input type="text" id="email" placeholder="Enter your email" />
          </div>

          <div class="form-client-contact">
            <label> Phone Number</label>
            <input type="text" id="phoneNumber"placeholder="Enter your phone number" />
          </div>
        </article>

        <div class="form-client-message">
          <label> Message </label>
          <textarea id="message" placeholder="Write your message here..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
      <div id="customPopup" class="popup hidden">
        <div class="popup-content">
          <p id="popupMessage"></p>
          <button onclick="closePopup()">Aceptar</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-left">
        <h2>Circle</h2>
        <p>
          2972 Westheimer Rd. Santa Ana, <br />
          Ilinois 85486
        </p>
      </div>

      <article class="footer-right">
        <div class="footer-column">
          <p>Team</p>
          <p>Press</p>
        </div>

        <div class="footer-column">
          <p><a href="/index.html#services">Services</a></p>
          <p><a href="/projects.html">Projects</a></p>
        </div>

        <div class="footer-column">
          <p>About Us</p>
          <p>Privacy Policy</p>
        </div>
      </article>
    </footer>

    <script src="/js/contacts.js"></script>
    <script src="/js/index.js"></script>
    
  </body>
</html>
