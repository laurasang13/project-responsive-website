<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Circle</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

    <body> 
        <header>
            <nav>
                <h2>Circle</h2>
                <ul>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/projects/1.html">Projects</a></li>
                    <li><a href="#">Services</a></li>
                </ul>

                <a href="contact.html" class="btn-contact">Contact Us</a>
            </nav>
        </header>

            <section class="contact">
                <h1 class="contact">Contact Us</h1>

                <form class="contact-form"> 
                    <div class="form-clients-name">
                        <label> Full Name</label>
                        <input type="text" placeholder="Enter your full name">
                    </div>

                    <div class="form-row">
                        <div> 
                            <label> Email </label>
                            <input type="text" placeholder="Enter your email">
                        </div>

                        <div class="form-client-contact">
                            <label> Phone Number</label>
                            <input type="text" placeholder="Enter your phone number">
                        </div>
                    </div>

                    <div class="form-client-message">
                        <label> Message </label>
                        <textarea placeholder="Write your message here..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn"> Submit </button>
                </form>
            </section>


        <footer class="footer">
            <div class="footer-left">
                <h2>Circle </h2> 
                <p>2972 Westheimer Rd. Santa Ana, <br> Ilinois 85486</p>
            </div>
            
            <div class="footer-right">
                <div class="footer-column">
                    <p> Team </p> 
                    <p> Press </p>
                </div>
            
                <div class="footer-column"> 
                    <p> Services </p>
                    <p> Projects </p>
                </div>

                <div class="footer-column"> 
                    <p> About Us </p>
                    <p> Privacy Policy</p>
                </div>
            </div>
        </footer>
  
    </body>
</html>
